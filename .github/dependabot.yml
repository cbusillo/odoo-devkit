---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    groups:
      all-version-updates:
        patterns:
          - "*"
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: "/"
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python:uv
    groups:
      all-version-updates:
        patterns:
          - "*"
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    ignore:
      # Existing tenant DB volumes still use the legacy /var/lib/postgresql/data
      # layout, so Postgres major upgrades must remain explicit migration work.
      - dependency-name: "postgres"
        update-types:
          - "version-update:semver-major"
    groups:
      all-version-updates:
        patterns:
          - "*"
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/docker"
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    groups:
      all-version-updates:
        patterns:
          - "*"
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
