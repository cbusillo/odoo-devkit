schema_version = 1
tenant = "replace-me"

[workspace]
name = "replace-me"
python = "3.13"
workspace_root = "~/Developer/odoo-workspaces"

[repos.tenant]
name = "odoo-tenant-replace-me"
path = "."
ref = "main"

[repos.devkit]
name = "odoo-devkit"
path = "../odoo-devkit"
ref = "main"

[repos.runtime]
name = "odoo-devkit"
path = "../odoo-devkit"
ref = "main"

[repos.shared_addons]
name = "odoo-shared-addons"
path = "../odoo-shared-addons"
ref = "main"

[runtime]
context = "replace-me"
instance = "local"
database = "replace-me"
addons_paths = ["sources/tenant/addons", "sources/shared-addons"]

[ide]
mode = "tenant_repo"
focus_paths = ["addons", "docs", "workspace.toml"]
attached_paths = ["sources/shared-addons", "sources/devkit"]

[codex]
workspace_agents = true
workspace_docs_index = true

[[ide.run_configurations]]
name = "Workspace Sync"
working_directory = "$PROJECT_DIR$"
command = [
  "uv",
  "--directory",
  "$PROJECT_DIR$/../odoo-devkit",
  "run",
  "platform",
  "workspace",
  "sync",
  "--manifest",
  "$PROJECT_DIR$/workspace.toml",
]

[[ide.run_configurations]]
name = "Workspace Status"
working_directory = "$PROJECT_DIR$"
command = [
  "uv",
  "--directory",
  "$PROJECT_DIR$/../odoo-devkit",
  "run",
  "platform",
  "workspace",
  "status",
  "--manifest",
  "$PROJECT_DIR$/workspace.toml",
]

[[ide.run_configurations]]
name = "replace-me Platform Select Local"
working_directory = "$PROJECT_DIR$"
command = ["uv", "--directory", "$PROJECT_DIR$/../odoo-devkit", "run", "platform", "runtime", "select", "--manifest", "$PROJECT_DIR$/workspace.toml"]

[[ide.run_configurations]]
name = "replace-me Platform Up Local"
working_directory = "$PROJECT_DIR$"
command = ["uv", "--directory", "$PROJECT_DIR$/../odoo-devkit", "run", "platform", "runtime", "up", "--manifest", "$PROJECT_DIR$/workspace.toml", "--build"]

[[ide.run_configurations]]
name = "replace-me Platform Update Local"
working_directory = "$PROJECT_DIR$"
command = ["uv", "--directory", "$PROJECT_DIR$/../odoo-devkit", "run", "platform", "runtime", "workflow", "--manifest", "$PROJECT_DIR$/workspace.toml", "--workflow", "update"]

[[ide.run_configurations]]
name = "replace-me Platform Restore Local"
working_directory = "$PROJECT_DIR$"
command = ["uv", "--directory", "$PROJECT_DIR$/../odoo-devkit", "run", "platform", "runtime", "restore", "--manifest", "$PROJECT_DIR$/workspace.toml"]

[[ide.run_configurations]]
name = "replace-me Platform Inspect Local"
working_directory = "$PROJECT_DIR$"
command = ["uv", "--directory", "$PROJECT_DIR$/../odoo-devkit", "run", "platform", "runtime", "inspect", "--manifest", "$PROJECT_DIR$/workspace.toml"]
